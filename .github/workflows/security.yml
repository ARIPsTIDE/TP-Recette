name: Security & Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  audit-node:
    name: Audit Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./recette-api
        run: npm install --include=dev

      - name: Audit vulnerabilities
        working-directory: ./recette-api
        run: npm audit --audit-level=high

  test-node:
    name: Tests API Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./recette-api
        run: npm install --include=dev

      - name: Run tests
        working-directory: ./recette-api
        run: node node_modules/jest/bin/jest.js --verbose

  audit-python:
    name: Audit Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install dependencies
        run: pip install -r Recette/requirements.txt

      - name: Audit Python packages
        run: pip-audit -r Recette/requirements.txt
        continue-on-error: true
