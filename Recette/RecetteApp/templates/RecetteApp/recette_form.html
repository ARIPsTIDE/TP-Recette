{% extends 'RecetteApp/base.html' %}
{% block title %}{{ action }} une recette{% endblock %}

{% block content %}
<h1>{{ action }} une recette</h1>

<form method="POST" class="mt-3">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Titre *</label>
        <input type="text" name="title" class="form-control" required value="{{ recette.title }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Categorie *</label>
        <select name="category" class="form-select" required>
            <option value="entree"   {% if recette.category == "entree"   %}selected{% endif %}>Entrée</option>
            <option value="plat"     {% if recette.category == "plat"     %}selected{% endif %}>Plat</option>
            <option value="dessert"  {% if recette.category == "dessert"  %}selected{% endif %}>Dessert</option>
            <option value="cocktail" {% if recette.category == "cocktail" %}selected{% endif %}>Cocktail</option>
        </select>
    </div>

    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="form-label">Temps de preparation (min)</label>
            <input type="number" name="preparation_time" class="form-control" value="{{ recette.preparation_time }}">
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Portions</label>
            <input type="number" name="portions" class="form-control" value="{{ recette.portions }}">
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Difficulté</label>
            <select name="difficulty" class="form-select">
                <option value="facile"    {% if recette.difficulty == "facile"    %}selected{% endif %}>Facile</option>
                <option value="moyen"     {% if recette.difficulty == "moyen"     %}selected{% endif %}>Moyen</option>
                <option value="difficile" {% if recette.difficulty == "difficile" %}selected{% endif %}>Difficile</option>
            </select>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Image (URL)</label>
        <input type="url" name="image" class="form-control" placeholder="https://exemple.com/image.jpg" value="{{ recette.image }}">
        {% if recette.image %}
            <img src="{{ recette.image }}" class="mt-2 rounded" style="max-height: 200px;">
        {% endif %}
    </div>

    <div class="mb-3">
        <label class="form-label">Ingrédients</label>
        <textarea name="ingredients" class="form-control" rows="4">{{ recette.ingredients }}</textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Ustensiles</label>
        <textarea name="utensils" class="form-control" rows="2">{{ recette.utensils }}</textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Étapes</label>
        <textarea name="steps" class="form-control" rows="6">{{ recette.steps }}</textarea>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success">{{ action }}</button>
        <a href="{% url 'recette_list' %}" class="btn btn-secondary">Annuler</a>
    </div>
</form>
{% endblock %}
